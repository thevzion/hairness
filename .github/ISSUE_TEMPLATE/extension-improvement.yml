name: Extension improvement
description: Improve an existing extension-owned behavior.
title: "extension: improve "
labels: ["area:extension"]
body:
  - type: input
    id: extension
    attributes: { label: Extension ID }
    validations: { required: true }
  - type: textarea
    id: behavior
    attributes: { label: Current and expected behavior }
    validations: { required: true }
  - type: textarea
    id: proof
    attributes: { label: Reproduction or evidence }
    validations: { required: true }
