name: Provider compatibility bug
description: Report different Codex or Claude behavior.
title: "provider: "
labels: ["kind:bug", "area:provider"]
body:
  - type: dropdown
    id: provider
    attributes: { label: Provider, options: [Codex, Claude] }
    validations: { required: true }
  - type: textarea
    id: command
    attributes: { label: Command and expected behavior }
    validations: { required: true }
  - type: textarea
    id: evidence
    attributes: { label: Sanitized receipt or reproduction, description: Never include transcripts or credentials. }
    validations: { required: true }
