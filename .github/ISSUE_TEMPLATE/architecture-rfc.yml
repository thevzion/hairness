name: Architecture RFC
description: Propose a change to Hairness documents, extension grammar, persistence, or safety guarantees.
title: "rfc: "
labels: ["kind:rfc", "area:architecture"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Observed problem
      description: What real Home, extension, or delivery flow is blocked?
    validations: { required: true }
  - type: textarea
    id: contract
    attributes:
      label: Proposed contract and invariants
    validations: { required: true }
  - type: textarea
    id: ownership
    attributes:
      label: Ownership and persistence
      description: Which layer owns source, runtime state, Overlay data, and generated output?
    validations: { required: true }
  - type: textarea
    id: breaking
    attributes:
      label: Breaking impact and rejected alternatives
    validations: { required: true }
