name: Extension proposal
description: Propose one reusable Hairness capability.
title: "extension: "
labels: ["kind:proposal", "area:extension"]
body:
  - type: textarea
    id: need
    attributes:
      label: Repeated need
      description: What real user problem repeats?
    validations: { required: true }
  - type: textarea
    id: contract
    attributes:
      label: Proposed contract
      description: Capabilities, recipes, adapters, schemas, gates, onboarding and tests.
    validations: { required: true }
  - type: textarea
    id: effects
    attributes:
      label: Effects and limits
      description: Adapter modes, checkpoints, Targets, exclusions and known uncertainty.
    validations: { required: true }
  - type: textarea
    id: proof
    attributes:
      label: Evidence
      description: Two-file prototype, live-source proof, Receipts or behavioral tests.
    validations: { required: true }
