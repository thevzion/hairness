name: npm release

run-name: npm release from ${{ github.sha }}

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: npm-release
  cancel-in-progress: false

env:
  NPM_VERSION: 11.5.1
  RELEASE_ARTIFACT: hairness-0.4-release-candidate

jobs:
  qualify:
    name: qualify (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Require the exact public main commit
        shell: bash
        run: |
          test "$GITHUB_REF" = "refs/heads/main"
          remote_main="$(git ls-remote origin refs/heads/main | cut -f1)"
          test "$GITHUB_SHA" = "$remote_main"
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          package-manager-cache: false
      - name: Use an OIDC-capable npm CLI
        run: npm install --global npm@${{ env.NPM_VERSION }}
      - run: npm ci --ignore-scripts
      - run: npm run check
      - run: npm test
      - run: npm run conformance
      - run: npm run check:providers
      - run: npm run check:pack

  package:
    name: package once
    needs: qualify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
      - name: Use an OIDC-capable npm CLI
        run: npm install --global npm@${{ env.NPM_VERSION }}
      - run: npm ci --ignore-scripts
      - run: npm run check:lab
      - name: Build and dry-run all release artifacts
        shell: bash
        run: |
          release_dir="$RUNNER_TEMP/npm-release"
          node scripts/release-packages.mjs "$release_dir"
          node scripts/release-publish.mjs "$release_dir/manifest.json" --dry-run
          echo "- commit: $GITHUB_SHA" >> "$GITHUB_STEP_SUMMARY"
          node -e "for (const p of require('$release_dir/manifest.json').packages) console.log('- ' + p.name + '@' + p.version + ': ' + p.integrity)" >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.RELEASE_ARTIFACT }}
          path: ${{ runner.temp }}/npm-release/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: publish npm
    needs: package
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/@hairness/cli
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Use an OIDC-capable npm CLI
        run: npm install --global npm@${{ env.NPM_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: ${{ env.RELEASE_ARTIFACT }}
          path: ${{ runner.temp }}/npm-release
      - name: Revalidate the qualified artifact and registry
        run: node scripts/release-publish.mjs "$RUNNER_TEMP/npm-release/manifest.json"
