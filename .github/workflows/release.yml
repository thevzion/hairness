name: npm release

run-name: npm release from ${{ github.sha }}

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: npm-release
  cancel-in-progress: false

env:
  NPM_VERSION: 11.5.1
  RELEASE_ARTIFACT: npm-release-candidate

jobs:
  qualify:
    name: qualify (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Require the exact public main commit
        shell: bash
        run: |
          test "$GITHUB_REF" = "refs/heads/main"
          remote_main="$(git ls-remote origin refs/heads/main | cut -f1)"
          test "$GITHUB_SHA" = "$remote_main"
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          package-manager-cache: false
      - name: Use an OIDC-capable npm CLI
        run: npm install --global npm@${{ env.NPM_VERSION }}
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run conformance
      - run: npm run check:providers
      - run: npm run check:pack

  package:
    name: package once
    needs: qualify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
      - name: Use an OIDC-capable npm CLI
        run: npm install --global npm@${{ env.NPM_VERSION }}
      - run: npm ci
      - run: npm run check:lab
      - name: Build and verify one release artifact
        shell: bash
        run: |
          release_dir="$RUNNER_TEMP/npm-release"
          mkdir -p "$release_dir"
          npm pack --json --pack-destination "$release_dir" > "$release_dir/pack.json"
          tarball_file="$(node -p "JSON.parse(require('node:fs').readFileSync('$release_dir/pack.json'))[0].filename")"
          shasum -a 256 "$release_dir/$tarball_file" > "$release_dir/sha256.txt"
          npm publish "$release_dir/$tarball_file" --dry-run --access public --tag next
          echo "- candidate: $tarball_file" >> "$GITHUB_STEP_SUMMARY"
          echo "- commit: $GITHUB_SHA" >> "$GITHUB_STEP_SUMMARY"
          echo "- sha256: $(cut -d' ' -f1 "$release_dir/sha256.txt")" >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.RELEASE_ARTIFACT }}
          path: ${{ runner.temp }}/npm-release/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: publish npm
    needs: package
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/@hairness/cli
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Use an OIDC-capable npm CLI
        run: npm install --global npm@${{ env.NPM_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: ${{ env.RELEASE_ARTIFACT }}
          path: ${{ runner.temp }}/npm-release
      - name: Revalidate the qualified artifact and registry
        id: preflight
        shell: bash
        run: |
          release_dir="$RUNNER_TEMP/npm-release"
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          tarball_file="$(node -p "JSON.parse(require('node:fs').readFileSync('$release_dir/pack.json'))[0].filename")"
          expected_sha="$(cut -d' ' -f1 "$release_dir/sha256.txt")"
          test "$(shasum -a 256 "$release_dir/$tarball_file" | cut -d' ' -f1)" = "$expected_sha"
          if npm view "$package_name@$package_version" version --json >/dev/null 2>&1; then
            echo "::error::$package_name@$package_version already exists"
            exit 1
          fi
          latest_before="$(npm view "$package_name" dist-tags.latest 2>/dev/null || true)"
          echo "latest_before=$latest_before" >> "$GITHUB_OUTPUT"
      - name: Publish the exact artifact through npm OIDC
        shell: bash
        run: |
          release_dir="$RUNNER_TEMP/npm-release"
          dist_tag="$(node -p "require('./package.json').publishConfig.tag")"
          tarball_file="$(node -p "JSON.parse(require('node:fs').readFileSync('$release_dir/pack.json'))[0].filename")"
          npm publish "$release_dir/$tarball_file" --access public --tag "$dist_tag"
      - name: Verify npm publication
        shell: bash
        env:
          LATEST_BEFORE: ${{ steps.preflight.outputs.latest_before }}
        run: |
          release_dir="$RUNNER_TEMP/npm-release"
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          dist_tag="$(node -p "require('./package.json').publishConfig.tag")"
          expected_integrity="$(node -p "JSON.parse(require('node:fs').readFileSync('$release_dir/pack.json'))[0].integrity")"
          remote_integrity=""
          attestations=""
          for attempt in {1..12}; do
            remote_integrity="$(npm view "$package_name@$package_version" dist.integrity 2>/dev/null || true)"
            attestations="$(npm view "$package_name@$package_version" dist.attestations --json 2>/dev/null || true)"
            if [ "$remote_integrity" = "$expected_integrity" ] && [ -n "$attestations" ] && [ "$attestations" != "null" ]; then
              break
            fi
            sleep 5
          done
          test "$remote_integrity" = "$expected_integrity"
          test "$(npm view "$package_name" "dist-tags.$dist_tag")" = "$package_version"
          latest_after="$(npm view "$package_name" dist-tags.latest 2>/dev/null || true)"
          test "$latest_after" = "$LATEST_BEFORE"
          test -n "$attestations"
          test "$attestations" != "null"
          echo "- package: $package_name@$package_version" >> "$GITHUB_STEP_SUMMARY"
          echo "- integrity: $expected_integrity" >> "$GITHUB_STEP_SUMMARY"
          echo "- npm provenance: verified" >> "$GITHUB_STEP_SUMMARY"
