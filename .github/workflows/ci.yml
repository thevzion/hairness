name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        node: [22, 24]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run check:commits
      - run: npm test
      - run: npm run conformance
      - run: npm run check:providers
      - run: npm run check:pack
